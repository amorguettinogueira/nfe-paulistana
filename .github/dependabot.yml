version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    groups:
      # Microsoft.Extensions.* libera em bloco — um PR único cobre todos os projetos.
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      # System.Security.* segue o mesmo ciclo do .NET runtime.
      system-security:
        patterns:
          - "System.Security.*"
      # Ferramentas de teste não afetam o pacote publicado.
      test-tooling:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    groups:
      # Todas as actions em um único PR semanal.
      github-actions:
        patterns:
          - "*"
